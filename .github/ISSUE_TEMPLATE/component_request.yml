name: Feature Request
description: Suggest an idea for Neobrutal UI
labels: ["enhancement"]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Description
      description: What is the new feature you are requesting?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do you need this feature? How does it benefit the community?
    validations:
      required: true
